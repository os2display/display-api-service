# Dynamic traefik config — loaded by the file provider from /config/.
# References TLS material at /certs/dev.{crt,key}, generated by
# `task dev:cert` into ./traefik/ssl/ (gitignored).
tls:
  options:
    modern:
      minVersion: VersionTLS12
      sniStrict: false
  certificates:
    - certFile: /certs/dev.crt
      keyFile: /certs/dev.key
