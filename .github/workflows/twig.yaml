### ### Twig
###
### Validates Twig files
###
### #### Assumptions
###
### 1. A docker compose service named `phpfpm` can be run and `composer` can be
###    run inside the `phpfpm` service.
### 2. [vincentlanglet/twig-cs-fixer](https://github.com/VincentLanglet/Twig-CS-Fixer)
###    is a dev requirement in `composer.json`:
###
###    ``` shell
###    docker compose run --rm --no-deps phpfpm composer require --dev vincentlanglet/twig-cs-fixer
###    ```
###
### 3. A [Configuration
###    file](https://github.com/VincentLanglet/Twig-CS-Fixer/blob/main/docs/configuration.md#configuration-file)
###    in the root of the project defines which files to check and rules to use.

name: Twig

env:
  COMPOSE_USER: runner

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  twig-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache vendor
        uses: actions/cache@v5
        with:
          path: vendor
          key: vendor-php8.4-${{ hashFiles('composer.lock') }}
          restore-keys: vendor-php8.4-

      - run: |
          docker network create frontend
          docker compose run --rm --no-deps phpfpm composer install
          docker compose run --rm --no-deps phpfpm vendor/bin/twig-cs-fixer lint
