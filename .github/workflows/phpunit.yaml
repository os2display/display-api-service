### ### Test (PHPUnit)
###
### Runs the API's PHPUnit test suite against a real database.
###
### #### Assumptions
###
### 1. A docker compose service named `phpfpm` can be run and `composer` can
###    be run inside the `phpfpm` service.
### 2. A `mariadb` service is reachable from `phpfpm`.
### 3. `composer run test-setup` and `composer run test` are defined.

on: pull_request

name: Test

env:
  COMPOSE_USER: runner

jobs:
  phpunit:
    runs-on: ubuntu-latest
    strategy:
      # Don't cancel the 11.x leg if 10.x fails (or vice versa); we want to
      # see version-specific failures rather than mask one with the other.
      fail-fast: false
      matrix:
        mariadb:
          - image: mariadb:10.11
            version: 10.11.13-MariaDB
          - image: mariadb:11.4
            version: 11.4.4-MariaDB
    name: PHP Unit tests (${{ matrix.mariadb.image }})
    env:
      # Picked up by docker-compose.yml's `image: ${MARIADB_IMAGE:-…}`.
      MARIADB_IMAGE: ${{ matrix.mariadb.image }}
      # Forwarded into phpfpm via `-e MARIADB_VERSION` below; .env then
      # interpolates it into Doctrine's `serverVersion` URL parameter.
      MARIADB_VERSION: ${{ matrix.mariadb.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache vendor
        uses: actions/cache@v5
        with:
          path: vendor
          key: vendor-php8.4-${{ hashFiles('composer.lock') }}
          restore-keys: vendor-php8.4-

      - name: Setup network
        run: docker network create frontend

      - name: Pull container images
        # Pull phpfpm and mariadb up front, in parallel, instead of on demand:
        # `docker compose run phpfpm` starts mariadb (depends_on), so otherwise
        # the two images are pulled serially inside the first step (~30s).
        run: docker compose pull --quiet phpfpm mariadb

      - name: Install Dependencies
        run: docker compose run --rm phpfpm composer install

      - name: PHP Unit - Test setup
        run: docker compose run --rm -e MARIADB_VERSION phpfpm composer run test-setup

      - name: PHP Unit - Run tests
        run: docker compose run --rm -e MARIADB_VERSION phpfpm composer run test
