# itk-version: 3.2.3
networks:
  # Compose-managed by default — the bundled traefik (profile `traefik`,
  # enabled by default via COMPOSE_PROFILES in .env) attaches here and
  # routes nginx + mail by their existing labels. Itkdev hosts running a
  # shared host-level traefik on an external `frontend` network opt in
  # via the `docker-compose.shared-frontend.yml` overlay (which flips this to
  # external) and set `COMPOSE_PROFILES=` to disable the bundled traefik.
  frontend:
    driver: bridge
    # Project-scoped engine name by default (`<project>_frontend`) so devs
    # who switch between bundled traefik and the shared-frontend overlay
    # don't collide with the itkdev-managed external `frontend` network.
    # Itkdev hosts override this to the shared name in .env.local
    # alongside the overlay (see `COMPOSE_FRONTEND_NETWORK` in .env).
    name: ${COMPOSE_FRONTEND_NETWORK:-${COMPOSE_PROJECT_NAME:-display}_frontend}
  app:
    driver: bridge
    internal: false

services:
  mariadb:
    # 11.4 is MariaDB's LTS series (supported until May 2029); 10.11 (LTS
    # until Feb 2028) is also tested in CI via the matrix in
    # .github/workflows/{phpunit,doctrine}.yaml. Override MARIADB_IMAGE
    # locally to test against 10.11; remember to set MARIADB_VERSION to
    # match (Doctrine uses it for dialect detection — see .env).
    image: ${MARIADB_IMAGE:-mariadb:11.4}
    networks:
      - app
    ports:
      - "3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 3
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_USER=db
      - MYSQL_PASSWORD=db
      - MYSQL_DATABASE=db

  phpfpm:
    image: itkdev/php8.4-fpm:latest
    user: ${COMPOSE_USER:-deploy}
    networks:
      - app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PHP_XDEBUG_MODE=${PHP_XDEBUG_MODE:-off}
      - PHP_MAX_EXECUTION_TIME=30
      - PHP_MEMORY_LIMIT=256M
      - DOCKER_HOST_DOMAIN=${COMPOSE_DOMAIN}
      - PHP_IDE_CONFIG=serverName=localhost
    depends_on:
      mariadb:
        condition: service_healthy
    volumes:
      - .:/app

  nginx:
    image: nginxinc/nginx-unprivileged:alpine
    networks:
      - app
      - frontend
    depends_on:
      - phpfpm
    ports:
      - "8080"
    volumes:
      - ./infrastructure/nginx/etc/templates:/etc/nginx/templates:ro
      - ./infrastructure/nginx/etc/nginx.conf:/etc/nginx/nginx.conf:ro
      - .:/app
    environment:
      NGINX_FPM_SERVICE: ${COMPOSE_PROJECT_NAME}-phpfpm-1
      NGINX_FPM_PORT: 9000
      NGINX_WEB_ROOT: /app/public
      NGINX_PORT: 8080
      NGINX_MAX_BODY_SIZE: 5M
      NGINX_SET_REAL_IP_FROM: 172.16.0.0/12
    healthcheck:
      # $$NGINX_PORT escapes compose-time interpolation; the variable is
      # expanded by the shell inside the container against the service's
      # environment.
      test:
        [
          "CMD-SHELL",
          'wget --quiet --tries=1 --spider "http://localhost:$$NGINX_PORT/health"',
        ]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 5s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${COMPOSE_FRONTEND_NETWORK:-${COMPOSE_PROJECT_NAME:-display}_frontend}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.rule=Host(`${COMPOSE_DOMAIN}`)"
      # HTTPS config - uncomment to enable redirect from :80 to :443
      # - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.middlewares=redirect-to-https"
      # - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"

  # Bundled traefik for fresh-clone dev — terminates TLS with a self-signed
  # cert (generated by `task dev:cert` into traefik/ssl/) and routes by
  # docker labels on nginx. Profile-gated so itkdev hosts running a
  # shared host-level traefik can disable it via COMPOSE_PROFILES= in
  # .env.local (paired with the docker-compose.shared-frontend.yml overlay).
  traefik:
    image: traefik:v3.6
    profiles: [traefik]
    restart: unless-stopped
    networks:
      - app
      - frontend
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./traefik/traefik.yml:/traefik.yml:ro
      - ./traefik/dynamic.yml:/config/dynamic.yml:ro
      - ./traefik/ssl:/certs:ro
      # Read-only docker socket so traefik can discover service labels.
      # Sufficient for local dev; a production setup would broker this
      # via a socket-proxy (see os2display-docker-server for that pattern).
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # Redis 8 GA'd 2025-05; back to OSI-approved licensing (AGPLv3) and
  # ships RedisJSON / RediSearch / RedisTimeSeries / RedisBloom in-tree.
  # Symfony 6.4 cache adapter only checks `redis_version >= 4.0`; the
  # phpredis 6.3 shipped in itkdev/php8.4-fpm supports the new RESP3
  # niceties without any code change here.
  redis:
    image: "redis:8"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    networks:
      - app
    ports:
      - "6379"

  node:
    image: node:24
    user: "${COMPOSE_NODE_USER:-root}"
    command: npm run dev
    networks:
      - app
      - frontend
    ports:
      - "5173"
    working_dir: /app
    environment:
      - NODE_ENV=development
      - COMPOSE_DOMAIN=${COMPOSE_DOMAIN}
    volumes:
      - .:/app:delegated
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${COMPOSE_FRONTEND_NETWORK:-${COMPOSE_PROJECT_NAME:-display}_frontend}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}node.rule=Host(`node-${COMPOSE_DOMAIN}`)"

  playwright:
    # https://playwright.dev/docs/docker
    # Version should match the one in `package.json`.
    image: mcr.microsoft.com/playwright:v1.57.0
    # Chromium needs more than Docker's default 64 MB /dev/shm once tests run in
    # parallel; sharing the host IPC namespace avoids renderer crashes
    # ("Target closed"). See the Playwright Docker docs.
    ipc: host
    networks:
      - app
    depends_on:
      nginx:
        condition: service_healthy
    volumes:
      - .:/app
      - /tmp/.X11-unix:/tmp/.X11-unix
    working_dir: /app

  markdownlint:
    image: peterdavehello/markdownlint
    profiles: [dev]
    volumes:
      - ./:/md

  prettier:
    # Prettier doesn't ship an official image
    # (https://github.com/prettier/prettier/issues/15206); jauderho/prettier
    # is a well-maintained community build.
    image: jauderho/prettier
    profiles: [dev]
    volumes:
      - ./:/work
